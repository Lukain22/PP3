<div class="container pt-5">
    <div class="row">
        <div class="col-lg-6 offset-lg-3">
            <div class="card text-center">
                <div class="card-body">
                    
                    <h3>Agregar Empleado</h3>
                    
                    <form>
                        <div class="row pt-2">
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Nombre">
                            </div>   
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Apellido">                            
                            </div>

                        </div> 
                            
                             <div class="mt-3">
                                <input type="text" class="form-control" placeholder="Email">
                            </div>
                        
                            <div class="mt-4">
                                <button class="btn btn-secondary btn-lg float-end" [routerLink]="['/list-empleados']">Volver</button>
                                <button class="btn btn-dark btn-lg float-end" [routerLink]="['/']">Agregar</button>
                            </div>          
                    </form>
                 

                </div>
                
            </div>
           
            
        </div>
        
    </div>
    
</div>

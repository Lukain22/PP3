
<div class="container pt-5">
    <div class="row">
        <div class="col-lg-6 offset-lg-3">
            <div class="card text-center">
                <div class="card-body">

<form [formGroup]="loginForm">
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Usuario</label>
    <input formControlName="usuario" type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Contraseña</label>
    <input formControlName="contraseña" type="password" class="form-control" id="exampleInputPassword1">
  </div>
  
  
  <button type="submit" (click)="login()" class="btn btn-dark btn-lg">Iniciar Sesión</button>
</form>

    </div>
                
            </div>
           
            
        </div>
        
    </div>
    
</div>
